############################
# 2. SOBRE MÍ
############################

[params.about]
    enable = true
    title = "Sobre mí"
    content = """
Soy **Ingeniero Matemático** apasionado por encontrar el orden dentro de sistemas complejos. Mi enfoque combina una base sólida en finanzas y análisis de datos con el poder de la programación para optimizar procesos y guiar la toma de decisiones estratégicas. Me motiva profundamente el aprendizaje continuo y la adaptabilidad ante nuevos retos tecnológicos, lo que me permite moverme con fluidez entre el modelado predictivo, la inteligencia de negocios y la analítica financiera.

En el día a día, disfruto traduciendo problemas abstractos en soluciones prácticas, ya sea mediante simulaciones Monte Carlo, algoritmos de aprendizaje supervisado o la creación de dashboards de alto impacto. Más allá de las herramientas técnicas, mi objetivo es siempre contribuir con un pensamiento analítico crítico que transforme los datos en valor real.
"""
    [params.about.skills]
        enable = true
        items = [
            "Python & R",
            "SQL & NoSQL",
            "Machine Learning",
            "Monte Carlo Simulation",
            "Power BI & Tableau",
            "Financial Modeling"
        ]

